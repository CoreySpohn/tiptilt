name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        python-version: ["3.12"]
        platform: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Create venv
      run: uv venv .venv --python ${{ matrix.python-version }}

    - name: Install package with test dependencies
      run: uv pip install -e ".[test]"
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/.venv

    # The main branches carry contract pieces newer than the PyPI releases
    # (multi-path modules in physicaloptix, the speckle-field contract in
    # optixstuff); drop each override once a release includes it.
    - name: Override unreleased dependencies from git main
      run: uv pip install "physicaloptix @ git+https://github.com/CoreySpohn/physicaloptix.git" "optixstuff @ git+https://github.com/CoreySpohn/optixstuff.git"
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/.venv

    - name: Diag pytest present
      run: .venv/bin/pytest --version

    - name: Diag imports
      run: .venv/bin/python -c "import jax, physicaloptix, tiptilt; from physicaloptix import BeamSplitter; print('jax', jax.__version__)"

    - name: Run tests
      run: .venv/bin/pytest tests/ -v --tb=short
